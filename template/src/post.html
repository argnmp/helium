{% extends "layout.html" %}
{% block postblock%} 
<article>
    <section class="w-full">
        <div class="px-5 py-3 mb-2 border border-blue-700 dark:border-blue-400">
            <p class="text-4xl font-bold text-gray-700 dark:text-gray-200 border-b-2 border-blue-700 dark:border-blue-400 py-1">{{title}}</p>
        </div>
        <div class="p-5 mb-2 border border-blue-700 dark:border-blue-400">
            <table class="table-auto border-collapse text-left text-sm text-gray-700 dark:text-gray-200 w-full">
                <thead class="text-xs border border-blue-700 dark:border-blue-400">
                </thead>
                <tbody>
                    <tr class="text-xs border border-blue-700 dark:border-blue-400">
                        <th scope="row" class="px-4 py-2 font-medium whitespace-nowrap dark:text-white">
                            alias
                        </th>
                        <td class="px-4 py-2">{{alias}}</td>
                    </tr>
                    <tr class="text-xs border border-blue-700 dark:border-blue-400">
                        <th scope="row" class="px-4 py-2 font-medium whitespace-nowrap dark:text-white">
                            author
                        </th>
                        <td class="px-4 py-2">{{author}}</td>
                    </tr>
                    <tr class="text-xs border border-blue-700 dark:border-blue-400">
                        <th scope="row" class="px-4 py-2 font-medium whitespace-nowrap dark:text-white">
                            created at
                        </th>
                        <td class="px-4 py-2">{{created_at}}</td>
                    </tr>
                    <tr class="text-xs border border-blue-700 dark:border-blue-400">
                        <th scope="row" class="px-4 py-2 font-medium whitespace-nowrap dark:text-white">
                            tags 
                        </th>
                        <td class="px-4 py-2">
                            {% for tag in tags %} 
                            <p>{{tag}} </p>
                            {% endfor %}
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div class="clear-none markdown-body p-5 border border-blue-700 dark:border-blue-400 mb-2">
        {{post}}
    </div>
</article>
{% endblock postblock%}
