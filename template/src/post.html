{% extends "layout.html" %}
{% block postblock%} 
<article>
    <section class="w-full">
    <div class="pb-8">
        <p class="text-4xl text-blue-700 dark:text-blue-400 py-2 px-2 border border-blue-700 dark:border-blue-400">{{title}}</p>
    </div>
    <table class="table-auto border-collapse text-left text-sm text-gray-500 dark:text-gray-400 w-full mb-8">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
            <tr>
                <th scope="col" class="px-4 py-2">
                    property
                </th>
                <th scope="col" class="px-4 py-2">
                    value
                </th>
            </tr>
        </thead>
        <tbody>
            <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
                    alias
                </th>
                <td class="px-4 py-2">{{alias}}</td>
            </tr>
            <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
                    author
                </th>
                <td class="px-4 py-2">{{author}}</td>
            </tr>
            <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
                    created at
                </th>
                <td class="px-4 py-2">{{created_at}}</td>
            </tr>
            <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
                    tags 
                </th>
                <td class="px-4 py-2">
                {% for tag in tags %} 
                    <p>{{tag}} </p>
                {% endfor %}
                </td>
            </tr>
        </tbody>
    </table>
    </section>
    <div class="markdown-body">
        {{post}}
    </div>
</article>
{% endblock postblock%}
