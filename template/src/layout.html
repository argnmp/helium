<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="/static/dist/main.css" rel="stylesheet">
    </head>
    <body class="dark:bg-black">
        <script type="module">
            import init, {Ground, Index} from '/static/dist/render.js'
            async function run(){
                await init();
                let g = Ground.new();
                await g.add(window.location.pathname);
                await g.load(window.location.pathname);
                document.querySelector("html").addEventListener('click', async function(e) {
                    e.preventDefault();
                    var anchor = e.target.closest('a');
                    if(anchor !== null) {
                        try {
                            await g.load(anchor.href);
                        } catch(e) {
                            window.location.href = anchor.href;
                        }
                    }
                }, false);
                let n = Index.new();
                await n.load("/static/searchindex");
                window.n = n;
                window.search = async function(e) {
                    let text = document.getElementById(`search_input`).value;
                    await n.search(text); 
                }

            }
            run();
        </script>

        <div id="main" class="p-5 md:container md:mx-auto md:px-16 lg:px-20 py-5 xl:px-48 box-border h-screen w-screen">

            <div class="grid grid-cols-1 md:grid-cols-12 gap-2 h-full w-full">
                <div class="md:col-span-4 lg:col-span-3">
                    <a href="/">
                        <div class="flex flex-col mb-2 text-blue-700 hover:text-gray-900 dark:text-blue-400 dark:hover:text-gray-200 transition-all duration-500 ease-in-out border-b border-blue-700 dark:border-blue-400">
                            <p class="text-left text-4xl font-bold">blog.argnmp</p>
                        </div>
                    </a>
                    <div class="flex md:flex-col p-4 bg-blue-700 dark:bg-blue-400 shadow-md text-gray-200 dark:text-gray-900">
                        <div class="w-full md:object-center basis-1/4">
                            <img class="w-full max-w-sm mx-auto" src="https://avatars.githubusercontent.com/u/145034257?v=4" />
                        </div>
                        <div class="grow pl-4 md:p-0">
                            <p class="text-xl md:mt-3">김태현</p>
                            <p class="text-sm">컴퓨터공학 관련 주제를 주로 다룹니다.</p>
                            <p class="text-xs"><a class="text-xs" href="https://github.com/argnmp">github</a></p>
                        </div>
                    </div>

                </div>
                <div class="grid-flow-row md:col-span-8 lg:col-span-9 rounded-lg">
                    <div>
                        <div class="py-2">
                            <form class="flex">
                                <input type="text" name="search" id="search_input" class="inline w-full rounded-md border-0 py-1 px-4 mr-2 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-1 focus:ring-inset focus:ring-blue-600 dark:focus:ring-blue-300 sm:text-sm sm:leading-6 dark:bg-gray-500 dark:text-gray-200" onkeyup="window.search()">
                                <input type="submit" name="submit" id="submit" class="inline bg-blue-700 hover:bg-white hover:text-blue-700 border border-blue-700 dark:border-blue-400 text-gray-200 dark:bg-blue-400 dark:text-gray-900 hover:dark:bg-gray-500 hover:dark:text-gray-200 rounded-md px-2 text-sm" onclick="window.search()" value="search">
                            </form>
                        </div>
                        <div class="" id="search_result">
                            <a class="" href="">
                                <div class="mb-1 px-2 py-1 border border-gray-200 dark:border-gray-600 dark:text-gray-200 hidden">
                                </div> 
                            </a>
                        </div> 
                    </div>
                    {% block listblock %}{% endblock listblock %}
                    {% block postblock %}{% endblock postblock %}
                </div>
            </div> 
        </div>
    </body>
</html>
