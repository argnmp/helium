<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="/static/dist/main.css" rel="stylesheet">
    </head>
    <body class="dark:bg-black">
        <script type="module">
            import init, {Ground} from '/static/dist/render.js'
            async function run(){
                await init();
                let g = Ground.new();
                await g.add(window.location.pathname);
                await g.load(window.location.pathname);
                document.querySelector("html").addEventListener('click', async function(e) {
                    e.preventDefault();
                    var anchor = e.target.closest('a');
                    if(anchor !== null) {
                        try {
                            await g.load(anchor.href);
                        } catch(e) {
                            window.location.href = anchor.href;
                        }
                    }
                }, false);
            }
            run();
        </script>

        <div id="main" class="lg:container md:mx-0 md:w-full lg:mx-auto py-10 px-10 box-border h-screen w-screen">

            <div class="grid grid-cols-1 md:grid-cols-12 gap-5 h-full w-full">
                <div class="md:col-span-4 lg:col-span-3">
                    <a href="/">
                        <div class="flex flex-col mb-2 px-5 py-3 hover:bg-blue-700 hover:dark:bg-blue-400 text-gray-700 hover:text-gray-200 dark:text-gray-200 dark:hover:text-gray-900 border-l-4 border-blue-700 dark:border-blue-400 transition-all duration-500 ease-in-out">
                            <p class="text-left">blog.argnmp</p>
                        </div>
                    </a>
                    <div class="flex flex-col p-5 bg-blue-700 dark:bg-blue-400 shadow-xl text-gray-200 dark:text-gray-900">
                        <div class="w-full object-center">
                            <img class="w-full max-w-sm mx-auto" src="https://avatars.githubusercontent.com/u/145034257?v=4" />
                        </div>
                        <p class="text-xl mt-3">김태현</p>
                        <p class="text-sm">컴퓨터공학 관련 주제를 주로 다룹니다.</p>
                        <a class="text-xs" href="https://github.com/argnmp">github</a>
                    </div>

                </div>
                <div class="md:col-span-8 lg:col-span-9 rounded-lg">
                    {% block listblock %}{% endblock listblock %}
                    {% block postblock %}{% endblock postblock %}
                </div>
            </div> 
        </div>
    </body>
</html>
