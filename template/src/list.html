{% extends "layout.html" %}
{% block listblock%}
<div>
    {% for element in list%}
    <div class="mb-2 py-3 px-5 border border-blue-700 dark:border-blue-400 hover:bg-blue-700 dark:hover:bg-blue-400 text-gray-700 hover:text-gray-200 dark:text-gray-200 dark:hover:text-gray-900">
        <p class="text-2xl">
            <a class="anc" href="{{element.link}}">
                {{element.title}}
            </a>
        </p>
        <p class="text-xs">
        {{element.created_at}}
        </p>
        <p class="text-xs">
        {{element.author}}
        </p>
    </div>
    {% endfor %}
</div>
{% endblock listblock%}
